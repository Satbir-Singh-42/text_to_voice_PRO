<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ──────────────────────────────────────── -->
  <title>Text to Voice PRO — Free Multi-Language Text to Speech Online</title>
  <meta name="description"
        content="Convert any text to natural-sounding speech in 50+ languages and accents — Hindi, English, Spanish, Arabic, Japanese and more. Free online TTS powered by Google. No sign-up required." />
  <meta name="keywords"
        content="text to speech, TTS, voice generator, online TTS, Hindi TTS, multi-language speech, Google TTS, voice converter, text to audio, speech synthesis" />
  <meta name="author" content="VoicePRO" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="canonical" href="https://voicepro.vercel.app/" />

  <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp) ──────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://voicepro.vercel.app/" />
  <meta property="og:title"       content="Text to Voice PRO — Free Multi-Language TTS" />
  <meta property="og:description" content="Convert text to natural speech in 50+ languages. Hindi, English, Arabic, Spanish and more. Free, no sign-up, powered by Google TTS." />
  <meta property="og:image"       content="/static/icons/icon-512.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:site_name"   content="VoicePRO" />
  <meta property="og:locale"      content="en_US" />

  <!-- ── Twitter Card ─────────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Text to Voice PRO — Free Multi-Language TTS" />
  <meta name="twitter:description" content="Convert text to natural speech in 50+ languages instantly. Free online TTS tool." />
  <meta name="twitter:image"       content="/static/icons/icon-512.png" />

  <!-- ── Favicons ──────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml"  href="/static/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png" />
  <link rel="apple-touch-icon"     sizes="180x180" href="/static/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <meta name="msapplication-TileColor" content="#6366f1" />
  <meta name="msapplication-TileImage" content="/static/icons/icon-192.png" />

  <!-- ── JSON-LD Structured Data ──────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Text to Voice PRO",
    "url": "https://voicepro.vercel.app/",
    "description": "Free online text-to-speech converter supporting 50+ languages and accents powered by Google TTS.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web Browser",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "50+ languages and accents",
      "Hindi, English, Arabic, Spanish, Japanese TTS",
      "Adjustable playback speed",
      "MP3 download",
      "No sign-up required"
    ],
    "screenshot": "/static/icons/icon-512.png",
    "creator": {
      "@type": "Organization",
      "name": "VoicePRO"
    }
  }
  </script>

  <!-- ── Fonts ──────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />

</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-shell">

    <!-- ── Sidebar ───────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <!-- Lucide mic-2 icon -->
          <div class="logo-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </div>
          <div>
            <div class="logo-title">VoicePRO</div>
            <div class="logo-sub">Multi-Language TTS</div>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="lang-search-wrap">
        <!-- Lucide search icon -->
        <svg class="search-svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="langSearch" type="text" placeholder="Search language…"
               autocomplete="off" spellcheck="false" />
      </div>

      <ul class="lang-list" id="langList">
        {% for lang in languages %}
        <li class="lang-item {% if loop.first %}active{% endif %}"
            data-lang="{{ lang.lang }}"
            data-tld="{{ lang.tld }}"
            data-id="{{ lang.id }}"
            data-name="{{ lang.name }}"
            data-slug="{{ lang.id }}">
          {{ lang.name }}
        </li>
        {% endfor %}
      </ul>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="topbar-center">
          <span id="selectedLangBadge" class="lang-badge">Hindi</span>
        </div>

        <div class="topbar-right">
          <span class="char-count" id="charCount">0 chars</span>

          <!-- Theme toggle: moon / sun -->
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark">
            <!-- Moon (dark mode) -->
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <!-- Sun (light mode) — hidden by default -->
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 style="display:none">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1"  y1="12" x2="3"  y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
              <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Card -->
      <div class="card">

        <!-- Textarea -->
        <section class="text-section">
          <label class="section-label" for="textInput">Your Text</label>
          <div class="textarea-wrap">
            <textarea id="textInput"
              placeholder="Type or paste your text here in any language — no character limit…"
              spellcheck="true"></textarea>
          </div>
        </section>

        <!-- Controls -->
        <section class="controls-section">

          <!-- Speed slider -->
          <div class="control-group speed-slider-wrap">
            <div class="control-label">Playback Speed</div>
            <div class="speed-range-row">
              <!-- Gauge icon = slow -->
              <svg class="speed-end-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
              <input type="range" class="speed-range" id="speedSlider" min="0" max="2" step="1" value="1" />
              <!-- Zap icon = fast -->
              <svg class="speed-end-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </div>
            <div class="speed-labels">
              <span class="speed-label-item" data-val="0">Slow</span>
              <span class="speed-label-item active" data-val="1">Normal</span>
              <span class="speed-label-item" data-val="2">Fast</span>
            </div>
          </div>

          <!-- Accent chip -->
          <div class="control-group accent-info-group">
            <div class="control-label">Voice Accent</div>
            <div class="accent-chip">
              <!-- Globe icon -->
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              <span id="accentLangCode">hi</span>
              <span class="accent-dot">·</span>
              <span id="accentTld">co.in</span>
            </div>
          </div>

        </section>

        <!-- Actions -->
        <section class="actions-section">

          <!-- Speak -->
          <button class="btn btn-speak" id="speakBtn">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Speak
          </button>

          <!-- Stop -->
          <button class="btn btn-stop" id="stopBtn" disabled>
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="3"/>
            </svg>
            Stop
          </button>

          <!-- Download -->
          <button class="btn btn-download" id="downloadBtn" disabled>
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Save MP3
          </button>

          <!-- Clear -->
          <button class="btn btn-clear" id="clearBtn">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
            Clear
          </button>

        </section>

        <!-- Player -->
        <section class="player-section">
          <!-- Waveform bars -->
          <div class="waveform" id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          </div>

          <audio id="audioPlayer" preload="none"></audio>

          <!-- Progress bar -->
          <div class="audio-progress-wrap" id="progressWrap">
            <span class="time-label" id="timeCurrent">0:00</span>
            <div class="audio-track" id="audioTrack">
              <div class="audio-fill" id="audioFill"></div>
              <div class="audio-thumb" id="audioThumb"></div>
            </div>
            <span class="time-label" id="timeDuration">0:00</span>
          </div>
        </section>

        <!-- Status bar -->
        <div class="status-bar">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Ready — select a language and press Speak</span>
          <span class="kbd-hint">Ctrl+Enter to speak</span>
        </div>

        <!-- Loader overlay -->
        <div class="loader-overlay" id="loaderOverlay">
          <div class="spinner"></div>
          <div class="loader-text" id="loaderText">Generating speech…</div>
        </div>

      </div><!-- /card -->
    </main>
  </div>

  <script>window.LANGUAGES = {{ languages | tojson }};</script>
  <script src="/static/js/app.js"></script>
</body>
</html>
